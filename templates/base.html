<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}University Support Assistant{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <header class="navbar">
        <div class="container navbar-inner">
            <div class="logo">Governor AI</div>
            <div class="sub">Godfrey Okoye University Assistant</div>
            <nav class="nav-links" aria-label="Primary">
                <a href="{{ url_for('main.chat_page') }}">Chat</a>
                <a href="{{ url_for('admin.dashboard') }}">Admin</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container">
            {% for category, msg in messages %}
            <div class="flash {{ category }}">{{ msg }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    
</body>
</html>
