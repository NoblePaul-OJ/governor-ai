{% extends "base.html" %}

{% block title %}Manage Intents{% endblock %}

{% block content %}
<section class="panel">
    <h2>Intent Rules</h2>

    <form method="post" action="{{ url_for('admin.update_intents') }}">
        <p>Modify the JSON below to adjust or add new intent rules. Any valid mapping will replace the
           existing rules when the form is submitted.</p>
        <textarea name="rules" rows="20" style="width:100%; font-family:monospace;">
{{ rules|tojson(indent=2) }}
        </textarea>
        <p>
            <button class="btn" type="submit">Save rules</button>
        </p>
    </form>
</section>
{% endblock %}
